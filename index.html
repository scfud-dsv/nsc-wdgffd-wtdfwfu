<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.bootcdn.net/ajax/libs/video.js/8.23.3/alt/video-js-cdn.css" rel="stylesheet">
	<title></title>
	<style>
     body {
         margin: 0;
         padding: 0;
         background: #000;
     }
     .video-container {
         position: fixed;
         top: 0;
         left: 0;
         width: 100%;
         height: 95%;
     }
     iframe {
         width: 100%;
         height: 100%;
         border: none;
     }
		
     #watermark {
         position: fixed;
         bottom: 20px;
         right: 20px;
         font-size: 24px;
         color: rgba(255,255,255,0.5);
         transform-origin: center;
         animation: rotate 6s linear infinite;
         pointer-events: none;
         user-select: none;
         z-index: 9999;
     }
        
     @keyframes rotate {
         from { transform: rotate(0deg); }
         to { transform: rotate(360deg); }
     }
    </style>
</head>
<body>
    // 例的网页内容
    <div id="watermark">内容字体</div>

    <script>
        // 这里是修改打印文字
        document.getElementById('watermark').textContent = "看完视频进入深夜群";
    </script>

</head>
<body>
    <div class="video-container">
        // 替换VIDEO_ID为实际视频ID
        <iframe src="白衣袖dem_(new).mp4" 
				allow="autoplay; encrypted-media" 
                allowfullscreen
				
				video controls controlslist="nodownload" oncontextmenu="return false;"></iframe>
				// 禁用右键菜单,防止通过右键下载
	<script>
        setTimeout(function() {
            window.location.href = "https://bg8177.com/register?key=6307408451"; // 替换为目标网址
        }, 9000); // 9000毫秒=9秒
    </script>
	</div>
    
    <script src="sldn.js" defer></script>
	</div>
    </style>
	</body>
</html>
